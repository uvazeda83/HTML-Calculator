<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
	<link rel="stylesheet" href="main.css" />
</head>
<body>
    <div class="app">
        <div class="base">
            <div class="display" id="result">
                <div class="input"></div>
            </div>
            <div class="keyboard">
                <button id="mr" class="button">MR</button>
                <button id="7" class="button whitebutton">7</button>
                <button id="8" class="button whitebutton">8</button>
                <button id="9" class="button whitebutton">9</button>
                <button id="/" class="button">/</button>
                <button id="bs" class="button">BS</button>
                
                <button id="m+" class="button">M+</button>
                <button id="4" class="button whitebutton">4</button>
                <button id="5" class="button whitebutton">5</button>
                <button id="6" class="button whitebutton">6</button>
                <button id="*" class="button">x</button>
                <button id="ac" class="button">AC</button>

                <button id="m-" class="button">M-</button>
                <button id="1" class="button whitebutton">1</button>
                <button id="2" class="button whitebutton">2</button>
                <button id="3" class="button whitebutton">3</button>
                <button id="-" class="button">−</button>
                <button id="=" class="button resultbutton">=</button>
                
                <button id="mc" class="button">MC</button>
                <button id="0" class="button whitebutton">0</button>
                <button id="." class="button whitebutton">,</button>
                <button id="％" class="button">%</button>
                <button id="+" class="button">+</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
